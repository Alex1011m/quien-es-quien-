<html lang="es">

    <meta charset="UTF-8">

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .flipped { opacity: 0.1; filter: grayscale(1) blur(4px); transform: scale(0.9); transition: all 0.3s ease; }
        .card-active { transition: all 0.2s ease; }
        .card-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- PANTALLA DE CARGA -->
    <div id="screen-loading" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-950 z-50">

    </div>

        let currentUser = null;

        window.onload = async () => {
            lucide.createIcons();
            initCategories();
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                showScreen('screen-menu');
            });
        };

        function showScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function initCategories() {
            const list = document.getElementById('category-list');
            const cats = [{id:'variado', n:'Variado'}, {id:'marcas', n:'Marcas'}, {id:'famosos', n:'Famosos'}, {id:'ficcion', n:'Ficción'}];
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = "bg-slate-800 hover:bg-yellow-400 hover:text-black p-4 rounded-2xl transition-all font-black text-[10px] uppercase";
                b.innerText = c.n;
                b.onclick = () => window.createRoomAction(c.id);
                list.appendChild(b);
            });
        }

        // ACCIONES GLOBALES (VINCULADAS A WINDOW)
        window.createRoomAction = async (catId) => {
            if(!currentUser) return;
            roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            const pool = catId === 'variado' ? DATABASE : DATABASE.filter(e => e.group === catId);
            const entities = pool.sort(() => 0.5 - Math.random()).slice(0, 20);
            
            const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', roomCode);
            await setDoc(roomRef, {
                code: roomCode, player1: currentUser.uid, player2: null, entities, 
                p1_secret: null, p2_secret: null, turn: currentUser.uid, 
                lastQuestion: null, lastAnswer: null, winner: null
            });
            document.getElementById('display-room-code').innerText = roomCode;
            listenRoom(roomCode);
            showScreen('screen-lobby');
        };

        window.joinRoomAction = async () => {
            const code = document.getElementById('input-room-code').value.toUpperCase();
            if(!code) return;
            const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', code);
            const snap = await getDoc(roomRef);
            if(snap.exists()) {
                const data = snap.data();
                if(!data.player2 || data.player2 === currentUser.uid) {
                    await updateDoc(roomRef, { player2: currentUser.uid });
                    roomCode = code;
                    listenRoom(code);
                } else { alert("Sala llena"); }
            } else { alert("No existe la sala"); }
        };

        function listenRoom(code) {
            const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', code);
            onSnapshot(roomRef, (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                roomData = data;
                const myId = currentUser.uid;
                const mySecret = myId === data.player1 ? data.p1_secret : data.p2_secret;

                if(data.player2 && !mySecret) {
                    renderPickGrid(data.entities);
                    showScreen('screen-picking');
                } else if(data.p1_secret && data.p2_secret) {
                    if(data.winner) {
                        showResultScreen(data.winner === myId);
                    } else {
                        renderGameUI(data);
                        showScreen('screen-game');
                    }
                }
            });
        }

        function renderPickGrid(entities) {
            const grid = document.getElementById('pick-grid');
            grid.innerHTML = "";
            entities.forEach(item => {
                const b = document.createElement('button');
                b.className = "relative h-48 rounded-2xl border-4 border-white bg-white overflow-hidden active:scale-95 shadow-md";
                b.innerHTML = `<img src="${item.img}" class="w-full h-full object-cover">
                               <div class="absolute inset-x-0 bottom-0 bg-black/60 p-2 text-[10px] font-black text-white uppercase">${item.name}</div>`;
                b.onclick = async () => {
                    const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', roomCode);
                    const field = currentUser.uid === roomData.player1 ? 'p1_secret' : 'p2_secret';
                    await updateDoc(roomRef, { [field]: item.id });
                    document.getElementById('waiting-rival-pick').classList.remove('hidden');
                };
                grid.appendChild(b);
            });
        }

        function renderGameUI(data) {
            const myId = currentUser.uid;
            const isMyTurn = data.turn === myId;
            const mySecretId = myId === data.player1 ? data.p1_secret : data.p2_secret;
            const secret = data.entities.find(e => e.id === mySecretId);

            document.getElementById('turn-indicator').className = isMyTurn ? "w-3 h-3 rounded-full bg-green-500 animate-pulse" : "w-3 h-3 rounded-full bg-slate-300";
            document.getElementById('turn-text').innerText = isMyTurn ? "Tu turno de preguntar" : "Turno del rival";
            document.getElementById('my-secret-img').src = secret.img;
            document.getElementById('my-secret-name').innerText = secret.name;

            const box = document.getElementById('answer-box');
            if(data.lastQuestion && !data.lastAnswer && !isMyTurn) {
                box.classList.remove('hidden');
                document.getElementById('rival-question-text').innerText = `"${data.lastQuestion}"`;
            } else { box.classList.add('hidden'); }

            const grid = document.getElementById('game-grid');
            if(grid.children.length === 0) {
                data.entities.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "relative h-44 bg-white rounded-2xl shadow-md border-4 border-white cursor-pointer overflow-hidden card-active";
                    card.innerHTML = `<img src="${item.img}" class="w-full h-full object-cover">
                                     <div class="absolute inset-x-0 bottom-0 bg-white/90 p-2 text-center text-[9px] font-black uppercase text-slate-800">${item.name}</div>`;
                    card.onclick = () => {
                        if(flippedIds.includes(item.id)) {
                            flippedIds = flippedIds.filter(x => x !== item.id);
                            card.classList.remove('flipped');
                        } else {
                            flippedIds.push(item.id);
                            card.classList.add('flipped');
                        }
                    };
                    grid.appendChild(card);
                });
                const sel = document.getElementById('select-solve');
                sel.innerHTML = '<option value="">¿QUIÉN ES?</option>';
                data.entities.forEach(e => {
                    const o = document.createElement('option');
                    o.value = e.id; o.innerText = e.name; sel.appendChild(o);
                });
            }

            if(data.lastQuestion && data.lastAnswer) {
                const hist = document.getElementById('chat-history');
                const lastMsg = hist.firstChild;
                if(!lastMsg || !lastMsg.innerText.includes(data.lastQuestion)) {
                    const d = document.createElement('div');
                    d.className = "p-4 rounded-[2rem] border-2 bg-white shadow-sm border-slate-100";
                    d.innerHTML = `<p class="text-[11px] font-bold text-slate-800">"${data.lastQuestion}"</p>
                                   <div class="flex justify-between items-center mt-2 pt-2 border-t">
                                     <span class="text-[8px] font-black uppercase text-slate-400">Respuesta:</span>
                                     <span class="text-[10px] font-black ${data.lastAnswer === 'SÍ' ? 'text-green-600' : 'text-red-600'}">${data.lastAnswer}</span>
                                   </div>`;
                    hist.prepend(d);
                }
            }
        }

        window.sendAnswerAction = async (ans) => {
            const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', roomCode);
            await updateDoc(roomRef, { lastAnswer: ans });
        };

        document.getElementById('input-question').onkeypress = async (e) => {
            if(e.key === 'Enter' && e.target.value.trim() && roomData.turn === currentUser.uid) {
                const q = e.target.value; e.target.value = "";
                const next = currentUser.uid === roomData.player1 ? roomData.player2 : roomData.player1;
                const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', roomCode);
                await updateDoc(roomRef, { lastQuestion: q, lastAnswer: null, turn: next });
            }
        };

        window.resolveGameAction = async (guessId) => {
            if(!guessId) return;
            const roomRef = doc(db, 'artifacts', appIdPrefix, 'public', 'data', 'rooms', roomCode);
            const rivalSec = currentUser.uid === roomData.player1 ? roomData.p2_secret : roomData.p1_secret;
            if(guessId === rivalSec) {
                await updateDoc(roomRef, { winner: currentUser.uid });
            } else {
                const rivalId = currentUser.uid === roomData.player1 ? roomData.player2 : roomData.player1;
                await updateDoc(roomRef, { winner: rivalId });
            }
        };

        function showResultScreen(win) {
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('result-title').innerText = win ? "¡VICTORIA!" : "¡DERROTA!";
            document.getElementById('result-card').className = `p-12 rounded-[4rem] text-center text-white shadow-2xl border-8 ${win ? 'bg-green-600 border-green-400' : 'bg-red-600 border-red-400'}`;
        }

        window.copyRoomCode = () => {
            const el = document.createElement('textarea');
            el.value = roomCode; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copiado: " + roomCode);
        };

    </script>
</body>
</html>
