<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHO? | Guess Who Multiverse</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        background-color: #020617; /* Slate-950 */
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      /* Preloader básico por si la conexión está lenta */
      #root:empty::before {
        content: "Cargando Universo...";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #6366f1;
        font-weight: bold;
        animate: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
